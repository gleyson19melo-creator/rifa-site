<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Criar conta | RifaPro</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>

  <main class="auth-page">
    <section class="auth-card">
      <div class="auth-logo">🍀</div>

      <h1>Criar conta</h1>
      <p>Comece agora a criar suas rifas e vender números online.</p>

      <form id="formCadastro">
        <label>Nome</label>
        <input type="text" placeholder="Digite seu nome" id="nome" required>

        <label>Email</label>
        <input type="email" placeholder="Digite seu email" id="email" required>

        <label>Senha</label>
        <input type="password" placeholder="Crie uma senha" id="senha" required>

        <button type="submit" class="auth-btn">Cadastrar agora</button>
      </form>

      <p id="msg" class="auth-msg"></p>

      <div class="auth-footer">
        Já tem conta?
        <a href="/login.html">Entrar</a>
      </div>
    </section>
  </main>

  <script>
    const form = document.getElementById('formCadastro');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const nome = document.getElementById('nome').value;
      const email = document.getElementById('email').value;
      const senha = document.getElementById('senha').value;

      const resposta = await fetch('/cadastro', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ nome, email, senha })
      });

      const dados = await resposta.json();
      document.getElementById('msg').innerText = dados.mensagem;

      if (dados.sucesso) {
        setTimeout(() => {
          window.location.href = "/login.html";
        }, 1000);
      }
    });
  </script>

</body>
</html>
