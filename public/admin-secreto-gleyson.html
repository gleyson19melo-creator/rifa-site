<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Secreto | RifaPro</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>

  <main class="auth-page">
    <section class="auth-card">
      <div class="auth-logo">👑</div>

      <h1>Login Admin</h1>
      <p>Acesso restrito ao administrador do RifaPro.</p>

      <form id="formAdmin">
        <label>Email</label>
        <input type="email" id="email" placeholder="Email admin" required>

        <label>Senha</label>
        <input type="password" id="senha" placeholder="Senha da conta" required>

        <label>Código secreto</label>
        <input type="password" id="codigoAdmin" placeholder="Código admin" required>

        <button type="submit" class="auth-btn" id="btnAdmin">
          Entrar como Admin
        </button>
      </form>

      <p id="msg" class="auth-msg"></p>
    </section>
  </main>

  <script>
    const form = document.getElementById('formAdmin');
    const msg = document.getElementById('msg');
    const btnAdmin = document.getElementById('btnAdmin');

    const CODIGO_ADMIN = "RIFAPRO2026";

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const email = document.getElementById('email').value.trim();
      const senha = document.getElementById('senha').value.trim();
      const codigoAdmin = document.getElementById('codigoAdmin').value.trim();

      if (!email || !senha || !codigoAdmin) {
        msg.innerText = "Preencha todos os campos ❌";
        return;
      }

      if (codigoAdmin !== CODIGO_ADMIN) {
        msg.innerText = "Código secreto incorreto ❌";
        return;
      }

      try {
        msg.innerText = "Entrando...";
        btnAdmin.disabled = true;
        btnAdmin.innerText = "Entrando...";

        const res = await fetch('/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, senha })
        });

        const dados = await res.json();

        if (!dados.sucesso) {
          msg.innerText = dados.mensagem || "Login inválido ❌";
          btnAdmin.disabled = false;
          btnAdmin.innerText = "Entrar como Admin";
          return;
        }

        const permissao = await fetch(`/admin/dados?email=${encodeURIComponent(email)}`);
        const dadosAdmin = await permissao.json();

        if (!dadosAdmin.sucesso) {
          msg.innerText = "Você não tem permissão de admin ❌";
          btnAdmin.disabled = false;
          btnAdmin.innerText = "Entrar como Admin";
          return;
        }

        localStorage.setItem("admin", JSON.stringify({
          email,
          loginAdmin: true
        }));

        window.location.href = "/admin.html";

      } catch (erro) {
        console.error(erro);
        msg.innerText = "Erro ao conectar ❌";
        btnAdmin.disabled = false;
        btnAdmin.innerText = "Entrar como Admin";
      }
    });
  </script>

</body>
</html>
