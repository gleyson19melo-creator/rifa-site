<script>
  const form = document.getElementById('formRifa');
  const lista = document.getElementById('lista');
  const usuario = localStorage.getItem('usuario');

  if (!usuario) {
    window.location.replace("/login.html");
  }

  const usuarioLogado = document.getElementById('usuarioLogado');
  if (usuarioLogado) {
    usuarioLogado.innerText = "Logado como: " + usuario;
  }

  const campoValor = document.getElementById('valor');

  if (campoValor) {
    campoValor.addEventListener('input', () => {
      let valor = campoValor.value.replace(/\D/g, '');
      valor = (Number(valor) / 100).toFixed(2);
      valor = valor.replace('.', ',');
      campoValor.value = valor;
    });
  }

  async function carregarRifas() {
    try {
      const res = await fetch(`/rifas/${usuario}`);

      if (!res.ok) throw new Error();

      const rifas = await res.json();

      if (!lista) return;

      lista.innerHTML = '';

      const totalRifas = document.getElementById('totalRifas');
      if (totalRifas) totalRifas.innerText = rifas.length;

      if (!rifas || rifas.length === 0) {
        lista.innerHTML = '<p>Nenhuma rifa criada ainda.</p>';
        return;
      }

      rifas.forEach(rifa => {
        const card = document.createElement('div');
        card.className = 'rifa-item';

        const link = `/rifa.html?id=${rifa.id}`;
        const linkCompleto = window.location.origin + link;

        const numeros = rifa.numeros || [];
        const vendidos = numeros.filter(n => n.status === 'vendido');
        const pendentes = numeros.filter(n => n.status === 'pendente');
        const total = Number(rifa.quantidade) || numeros.length || 0;
        const porcentagem = total > 0 ? (vendidos.length / total) * 100 : 0;

        const mensagemWhatsApp = encodeURIComponent(
          `🍀 Olha minha rifa: ${rifa.nome}\n🎁 Prêmio: ${rifa.premio || 'Não informado'}\n💰 Valor: R$ ${rifa.valor}\n\n👉 ${linkCompleto}`
        );

        let resultadoGanhador = '';

        if (rifa.ganhador) {
          const textoResultado = encodeURIComponent(
            `🏆 Resultado da rifa!\n🎁 ${rifa.nome}\n👤 ${rifa.ganhador.comprador}\n🎟️ ${rifa.ganhador.numero}`
          );

          resultadoGanhador = `
            <div class="ganhador-home">
              <span class="badge-finalizada">FINALIZADA</span><br><br>
              🏆 ${rifa.ganhador.comprador}<br>
              🎟️ ${rifa.ganhador.numero}<br><br>

              <a class="btn-whatsapp" href="https://wa.me/?text=${textoResultado}" target="_blank">
                Enviar resultado 📲
              </a>
            </div>
          `;
        }

        const blocoPendentes = pendentes.length > 0 ? `
          <button class="btn" onclick="togglePendentes('${rifa.id}')">
            Pendentes (${pendentes.length})
          </button>

          <div id="pendentes-${rifa.id}" style="display:none;">
            ${pendentes.map(n => `
              <div>
                Nº ${n.numero}<br>
                ${n.comprador || ''}<br>

                <button onclick="confirmar('${rifa.id}', ${n.numero})">OK</button>
                <button onclick="cancelar('${rifa.id}', ${n.numero})">X</button>
              </div>
            `).join('')}
          </div>
        ` : '';

        card.innerHTML = `
          <h3>${rifa.nome}</h3>
          <p>R$ ${rifa.valor}</p>

          ${resultadoGanhador}
          ${blocoPendentes}

          <a href="${link}" target="_blank">Ver</a>
          <button onclick="sortear('${rifa.id}')">Sortear</button>
          <button onclick="excluirRifa('${rifa.id}')">Excluir</button>
        `;

        lista.appendChild(card);
      });

    } catch (erro) {
      console.error(erro);
      if (lista) lista.innerHTML = '<p>Erro ao carregar 😢</p>';
    }
  }

  if (form) {
    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      try {
        const nome = document.getElementById('nome')?.value;
        const premio = document.getElementById('premio')?.value;
        const valor = document.getElementById('valor')?.value.replace(',', '.');
        const quantidade = document.getElementById('quantidade')?.value;
        const chavePix = document.getElementById('chavePix')?.value;

        const res = await fetch('/criar-rifa', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ nome, premio, valor, quantidade, usuario, chavePix })
        });

        const dados = await res.json();

        const msg = document.getElementById('msg');
        if (msg) msg.innerText = dados.mensagem;

        if (dados.sucesso) {
          form.reset();
          carregarRifas();
        }

      } catch (erro) {
        console.error(erro);
      }
    });
  }

  async function confirmar(rifaId, numero) {
    try {
      await fetch('/confirmar-pagamento', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ rifaId, numero, usuario })
      });
      carregarRifas();
    } catch {}
  }

  async function cancelar(rifaId, numero) {
    try {
      await fetch('/cancelar-reserva', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ rifaId, numero, usuario })
      });
      carregarRifas();
    } catch {}
  }

  async function sortear(id) {
    if (!confirm("Sortear?")) return;

    try {
      await fetch('/sortear-ganhador', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ rifaId: id, usuario })
      });
      carregarRifas();
    } catch {}
  }

  async function excluirRifa(id) {
    if (!confirm("Excluir?")) return;

    try {
      await fetch(`/excluir-rifa/${id}`, { method: 'DELETE' });
      carregarRifas();
    } catch {}
  }

  function togglePendentes(id) {
    const box = document.getElementById(`pendentes-${id}`);
    if (!box) return;
    box.style.display = box.style.display === 'none' ? 'block' : 'none';
  }

  function sair() {
    localStorage.removeItem('usuario');
    window.location.replace("/login.html");
  }

  carregarRifas();
</script>
