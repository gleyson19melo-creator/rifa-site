<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel | RifaPro</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>

<main class="dashboard-page">

<header class="dashboard-header">
  <div>
    <span class="dash-badge">🍀 RifaPro</span>
    <h1>Painel do Usuário</h1>
    <p id="usuarioLogado"></p>
  </div>

  <button class="btn-sair" onclick="sair()">Sair</button>
</header>

<section class="dashboard-grid">
  <div class="dash-card form-card">
    <h2>Criar nova rifa</h2>

    <form id="formRifa">
      <input type="text" placeholder="Nome da rifa" id="nome" required>
      <input type="text" placeholder="Prêmio" id="premio" required>
      <input type="text" placeholder="Valor" id="valor" required>
      <input type="number" placeholder="Quantidade" id="quantidade" required>
      <input type="text" placeholder="Chave PIX" id="chavePix" required>

      <button type="submit" class="btn-criar">Criar</button>
    </form>

    <p id="msg"></p>
  </div>

  <div class="dash-card">
    <h2>Resumo</h2>
    <p>Rifas: <strong id="totalRifas">0</strong></p>
  </div>
</section>

<section class="dash-card">
  <h2>Minhas rifas</h2>
  <div id="lista"></div>
</section>

</main>

<script>
const lista = document.getElementById('lista');
const usuario = localStorage.getItem('usuario');

document.getElementById('usuarioLogado').innerText = "Logado como: " + usuario;

async function carregarRifas() {
  const res = await fetch(`/rifas/${usuario}`);
  const rifas = await res.json();

  lista.innerHTML = '';

  rifas.forEach(rifa => {
    const card = document.createElement('div');
    card.className = 'rifa-item';

    const pendentes = rifa.numeros.filter(n => n.status === 'pendente');

    card.innerHTML = `
      <h3>${rifa.nome}</h3>

      <p>Vendidos: ${rifa.numeros.filter(n => n.status === 'vendido').length}</p>
      <p>Pendentes: ${pendentes.length}</p>

      <button onclick="sortear('${rifa.id}')">Sortear</button>

      <div>
        ${pendentes.map(n => `
          <div style="margin-top:10px; padding:10px; background:#fff3cd;">
            Número ${n.numero} - ${n.comprador}

            <button onclick="confirmar('${rifa.id}', ${n.numero})">
              Confirmar pagamento
            </button>

            <button onclick="cancelar('${rifa.id}', ${n.numero})">
              Cancelar
            </button>
          </div>
        `).join('')}
      </div>
    `;

    lista.appendChild(card);
  });
}

// 🔥 CONFIRMAR PAGAMENTO
async function confirmar(rifaId, numero) {
  const res = await fetch('/confirmar-pagamento', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      rifaId,
      numero,
      usuario
    })
  });

  const dados = await res.json();
  alert(dados.mensagem);
  carregarRifas();
}

// ❌ CANCELAR
async function cancelar(rifaId, numero) {
  const res = await fetch('/cancelar-reserva', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      rifaId,
      numero,
      usuario
    })
  });

  const dados = await res.json();
  alert(dados.mensagem);
  carregarRifas();
}

// 🎲 SORTEAR
async function sortear(id) {
  const res = await fetch('/sortear-ganhador', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ rifaId: id, usuario })
  });

  const dados = await res.json();
  alert(dados.mensagem);
  carregarRifas();
}

carregarRifas();
</script>

</body>
</html>
