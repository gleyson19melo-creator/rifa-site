<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel | RifaPro</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>

<main class="dashboard-page">

<header class="dashboard-header">
  <div>
    <span class="dash-badge">🍀 RifaPro</span>
    <h1>Painel do Usuário</h1>
    <p id="usuarioLogado"></p>
  </div>

  <button class="btn-sair" onclick="sair()">Sair</button>
</header>

<section class="dashboard-grid">
  <div class="dash-card form-card">
    <h2>Criar nova rifa</h2>

    <form id="formRifa">
      <input type="text" placeholder="Nome da rifa" id="nome" required>
      <input type="text" placeholder="Prêmio" id="premio" required>
      <input type="text" placeholder="Valor" id="valor" required>
      <input type="number" placeholder="Quantidade" id="quantidade" required>
      <input type="text" placeholder="Chave PIX" id="chavePix" required>

      <button type="submit" class="btn-criar">Criar</button>
    </form>

    <p id="msg"></p>
  </div>

  <div class="dash-card">
    <h2>Resumo</h2>
    <p>Rifas: <strong id="totalRifas">0</strong></p>
  </div>
</section>

<section class="dash-card">
  <h2>Minhas rifas</h2>
  <div id="lista"></div>
</section>

</main>

<script>
const form = document.getElementById('formRifa');
const lista = document.getElementById('lista');
const usuario = localStorage.getItem('usuario');

if (!usuario) {
  window.location.replace("/login.html");
}

document.getElementById('usuarioLogado').innerText = "Logado como: " + usuario;

async function carregarRifas() {
  const res = await fetch(`/rifas/${usuario}`);
  const rifas = await res.json();

  lista.innerHTML = '';
  document.getElementById('totalRifas').innerText = rifas.length;

  rifas.forEach(rifa => {
    const card = document.createElement('div');
    card.className = 'rifa-item';

    const pendentes = rifa.numeros.filter(n => n.status === 'pendente');
    const vendidos = rifa.numeros.filter(n => n.status === 'vendido');

    let mensagemGanhador = '';

    if (rifa.ganhador) {
      const textoWhatsApp = encodeURIComponent(
        `🏆 Resultado da rifa!\n\n` +
        `🎁 Rifa: ${rifa.nome}\n` +
        `🎁 Prêmio: ${rifa.premio || 'Não informado'}\n` +
        `👤 Ganhador: ${rifa.ganhador.comprador}\n` +
        `🎟️ Número sorteado: ${rifa.ganhador.numero}\n\n` +
        `Parabéns! Você foi o ganhador da rifa 🍀`
      );

      mensagemGanhador = `
        <div style="margin-top:12px; padding:12px; background:#dcfce7; border-radius:12px; color:#166534; font-weight:bold;">
          🏆 Ganhador: ${rifa.ganhador.comprador}<br>
          🎟️ Número: ${rifa.ganhador.numero}<br><br>

          <a class="btn-whatsapp" href="https://wa.me/?text=${textoWhatsApp}" target="_blank">
            Enviar resultado no WhatsApp 📲
          </a>
        </div>
      `;
    }

    card.innerHTML = `
      <div>
        <h3>${rifa.nome}</h3>

        <p>🎁 Prêmio: ${rifa.premio || 'Não informado'}</p>
        <p>💰 Valor: R$ ${rifa.valor}</p>
        <p>Vendidos: ${vendidos.length}</p>
        <p>Pendentes: ${pendentes.length}</p>

        ${mensagemGanhador}

        ${!rifa.ganhador ? `
          <button onclick="sortear('${rifa.id}')">Sortear</button>
        ` : ''}
      </div>

      <div>
        ${pendentes.map(n => `
          <div style="margin-top:10px; padding:10px; background:#fff3cd; border-radius:12px;">
            <strong>⏳ Número ${n.numero}</strong><br>
            Cliente: ${n.comprador}<br>
            WhatsApp: ${n.whatsapp || 'Não informado'}<br><br>

            <button onclick="confirmar('${rifa.id}', ${n.numero})">
              Confirmar pagamento
            </button>

            <button onclick="cancelar('${rifa.id}', ${n.numero})">
              Cancelar
            </button>
          </div>
        `).join('')}
      </div>
    `;

    lista.appendChild(card);
  });
}

form.addEventListener('submit', async (e) => {
  e.preventDefault();

  const nome = document.getElementById('nome').value;
  const premio = document.getElementById('premio').value;
  const valor = document.getElementById('valor').value.replace(',', '.');
  const quantidade = document.getElementById('quantidade').value;
  const chavePix = document.getElementById('chavePix').value;

  const res = await fetch('/criar-rifa', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      nome,
      premio,
      valor,
      quantidade,
      usuario,
      chavePix
    })
  });

  const dados = await res.json();
  document.getElementById('msg').innerText = dados.mensagem;

  form.reset();
  carregarRifas();
});

async function confirmar(rifaId, numero) {
  const res = await fetch('/confirmar-pagamento', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      rifaId,
      numero,
      usuario
    })
  });

  const dados = await res.json();
  alert(dados.mensagem);
  carregarRifas();
}

async function cancelar(rifaId, numero) {
  const res = await fetch('/cancelar-reserva', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      rifaId,
      numero,
      usuario
    })
  });

  const dados = await res.json();
  alert(dados.mensagem);
  carregarRifas();
}

async function sortear(id) {
  const confirmarSorteio = confirm("Tem certeza que quer sortear essa rifa?");
  if (!confirmarSorteio) return;

  const res = await fetch('/sortear-ganhador', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ rifaId: id, usuario })
  });

  const dados = await res.json();
  alert(dados.mensagem);
  carregarRifas();
}

function sair() {
  localStorage.removeItem('usuario');
  window.location.replace("/login.html");
}

carregarRifas();
</script>

</body>
</html>
