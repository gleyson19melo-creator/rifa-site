<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entrar | RifaPro</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>

  <main class="auth-page">
    <section class="auth-card">
      <div class="auth-logo">🍀</div>

      <h1>Entrar no RifaPro</h1>
      <p>Entre para criar, gerenciar e acompanhar suas rifas online.</p>

      <form id="formLogin">
        <label>Email</label>
        <input type="email" placeholder="Digite seu email" id="email" required>

        <label>Senha</label>
        <input type="password" placeholder="Digite sua senha" id="senha" required>

        <button type="submit" class="auth-btn" id="btnLogin">Entrar agora</button>
      </form>

      <p id="msg" class="auth-msg"></p>

      <div class="auth-footer">
        Ainda não tem conta?
        <a href="/cadastro.html">Criar conta</a>
      </div>
    </section>
  </main>

  <script>
    const form = document.getElementById('formLogin');
    const msg = document.getElementById('msg');
    const btnLogin = document.getElementById('btnLogin');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      try {
        const email = document.getElementById('email').value.trim();
        const senha = document.getElementById('senha').value.trim();

        if (!email || !senha) {
          msg.innerText = "Preencha todos os campos ❌";
          return;
        }

        msg.innerText = "Entrando...";
        btnLogin.disabled = true;
        btnLogin.innerText = "Entrando...";

        const resposta = await fetch('/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, senha })
        });

        const dados = await resposta.json();
        msg.innerText = dados.mensagem || "Resposta recebida";

        if (dados.sucesso) {
          localStorage.setItem('usuario', email);
          window.location.href = "/painel.html";
          return;
        }

        btnLogin.disabled = false;
        btnLogin.innerText = "Entrar agora";

      } catch (erro) {
        console.error(erro);
        msg.innerText = "Erro ao conectar com o servidor ❌";
        btnLogin.disabled = false;
        btnLogin.innerText = "Entrar agora";
      }
    });
  </script>

</body>
</html>
